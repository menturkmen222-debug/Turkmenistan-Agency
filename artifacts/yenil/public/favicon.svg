<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 100 100">
  <defs>
    <filter id="green" color-interpolation-filters="sRGB">
      <feColorMatrix type="hueRotate" values="-75"/>
      <feComponentTransfer>
        <feFuncR type="linear" slope="0.8"/>
        <feFuncG type="linear" slope="1.0"/>
        <feFuncB type="linear" slope="0.6"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <image href="images/yenil-mark.png" x="0" y="0" width="100" height="100" filter="url(#green)"/>
</svg>
