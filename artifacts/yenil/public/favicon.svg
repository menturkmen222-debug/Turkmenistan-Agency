<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 100 100">
  <defs>
    <filter id="green-shift" color-interpolation-filters="sRGB">
      <feColorMatrix type="hueRotate" values="-100"/>
      <feComponentTransfer>
        <feFuncR type="linear" slope="0.7"/>
        <feFuncG type="linear" slope="1.3"/>
        <feFuncB type="linear" slope="0.6"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="100" height="100" rx="16" fill="#0a0f0d"/>
  <image href="images/yenil-mark-new.png" x="5" y="5" width="90" height="90" filter="url(#green-shift)"/>
</svg>
